<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Storage</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #0a0a0a; color: #00ff00; margin: 0; }
        .box { background: #111; padding: 40px; border-radius: 15px; border: 1px solid #00ff00; text-align: center; width: 350px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        h2 { margin-bottom: 25px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #00ff00; background: #000; color: #00ff00; width: 85%; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }
        button { padding: 12px 25px; background: #00ff00; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #00cc00; transform: scale(1.02); }
        #linkArea { display: none; margin-top: 25px; }

        .download-btn { color: #000; text-decoration: none; font-weight: bold; background: #00ff00; padding: 12px; border-radius: 8px; display: block; transition: 0.3s; }
        .tg-btn { color: #fff; text-decoration: none; font-weight: bold; background: #24A1DE; padding: 12px; border-radius: 8px; display: block; transition: 0.3s; }
        .download-btn:hover, .tg-btn:hover { opacity: 0.8; }

</head>

            <a href="https://t.me/TheZipFile2/3" target="_blank" class="tg-btn">🔘 Join Telegram Channel</a>
        </div>
    </div>
</div>

<script>
    function check() {
        const p = document.getElementById('passInput').value;
        if (p === "706609") {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('linkArea').style.display = 'block';
        } else {
            alert("Wrong Password! Try again.");

    document.getElementById("passInput").addEventListener("keyup", function(e) {
        if (e.key === "Enter") check();

</script>

</body>
</html>
